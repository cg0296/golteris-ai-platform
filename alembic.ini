# Alembic configuration for Golteris database migrations.
#
# Usage:
#   alembic upgrade head        — apply all pending migrations
#   alembic revision --autogenerate -m "description"  — generate a new migration
#   alembic downgrade -1        — roll back one migration
#   alembic history             — show migration history
#
# The database URL can be overridden by the DATABASE_URL environment variable
# (see backend/db/migrations/env.py). The value below is the local dev default.

[alembic]
script_location = backend/db/migrations
prepend_sys_path = .
sqlalchemy.url = postgresql://golteris:golteris@localhost:5432/golteris

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
